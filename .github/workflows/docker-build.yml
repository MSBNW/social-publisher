name: Build & Push Docker Image
on:
  push:
    branches: [main, whitelabel, dreamcrew]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          build-args: |
            NEXT_PUBLIC_APP_NAME=SocialPublisher
            NEXT_PUBLIC_APP_DESCRIPTION=AI-powered social media publishing
            NEXT_PUBLIC_APP_ACCENT_COLOR=#3B82F6
            NEXT_PUBLIC_APP_LOGO_URL=/branding/social-publisher-logo.png
            NEXT_PUBLIC_APP_FAVICON_URL=/branding/social-publisher-favicon.png
            NEXT_PUBLIC_APP_TERMS_URL=https://getsocialpublisher.com/terms
            NEXT_PUBLIC_APP_PRIVACY_URL=https://getsocialpublisher.com/privacy
            NEXT_PUBLIC_APP_DOCS_URL=https://docs.getsocialpublisher.com
          tags: |
            ghcr.io/msbnw/social-publisher:latest
            ghcr.io/msbnw/social-publisher:${{ github.sha }}
            registry.fly.io/dreamcrew-social-publisher:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
